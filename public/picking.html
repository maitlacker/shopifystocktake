<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Picking – The Self Styler WMS</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <style>
    /* ── Picking-specific styles ── */
    .pick-form {
      display: flex;
      align-items: flex-end;
      gap: 14px;
      flex-wrap: wrap;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }
    .pick-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .pick-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .pick-input {
      width: 130px;
      padding: 12px 14px;
      font-size: 1.1rem;
      font-weight: 600;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      outline: none;
      color: #1a1a2e;
      -webkit-appearance: none;
    }
    .pick-input:focus { border-color: #4f46e5; }

    /* Progress bar */
    .pick-progress {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #1a1a2e;
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .pick-progress.visible { display: flex; }
    .pick-progress-text {
      font-size: 1rem;
      font-weight: 600;
    }
    .pick-progress-bar-wrap {
      flex: 1;
      min-width: 120px;
      height: 8px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      overflow: hidden;
    }
    .pick-progress-bar {
      height: 100%;
      background: #4f46e5;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .pick-progress-bar.complete { background: #15803d; }
    .pick-reset-btn {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* Pick list */
    .pick-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .pick-item {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px 16px;
      transition: opacity 0.35s ease, background 0.35s ease;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    .pick-item.picked {
      opacity: 0.38;
      background: #f8fafc;
    }
    .pick-item.tap-flash {
      background: #ede9fe;
    }

    /* Tick circle */
    .pick-tick {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2.5px solid #cbd5e1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.25s, border-color 0.25s;
    }
    .pick-item.picked .pick-tick {
      background: #15803d;
      border-color: #15803d;
    }
    .pick-tick-icon {
      display: none;
      color: #fff;
      font-size: 1.1rem;
      line-height: 1;
    }
    .pick-item.picked .pick-tick-icon { display: block; }

    /* Thumbnail */
    .pick-thumb {
      flex-shrink: 0;
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      background: #f1f5f9;
    }
    .pick-thumb-placeholder {
      flex-shrink: 0;
      width: 80px;
      height: 80px;
      border-radius: 8px;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #cbd5e1;
      font-size: 1.8rem;
    }

    /* Item details */
    .pick-details {
      flex: 1;
      min-width: 0;
    }
    .pick-sku {
      font-size: 0.82rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 3px;
    }
    .pick-title {
      font-size: 1rem;
      font-weight: 600;
      color: #1a1a2e;
      line-height: 1.3;
    }
    .pick-variant {
      font-size: 1rem;
      font-weight: 700;
      color: #374151;
      margin-top: 3px;
    }

    /* QTY badge */
    .pick-qty {
      flex-shrink: 0;
      min-width: 48px;
      height: 48px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 800;
      background: #f1f5f9;
      color: #1a1a2e;
    }
    .pick-qty.multi {
      background: #fee2e2;
      color: #b91c1c;
    }

    /* Right column: order number + qty */
    .pick-right {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .pick-order-num {
      font-size: 0.78rem;
      font-weight: 700;
      color: #4f46e5;
      letter-spacing: 0.02em;
    }
    .pick-qty-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .pick-stock {
      font-size: 0.78rem;
      font-weight: 600;
      color: #94a3b8;
      white-space: nowrap;
    }

    /* State messages */
    .pick-state {
      text-align: center;
      padding: 48px 24px;
      color: #64748b;
      font-size: 1rem;
    }
    .pick-complete-msg {
      display: none;
      text-align: center;
      padding: 24px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 12px;
      color: #15803d;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .pick-complete-msg.visible { display: block; }

    /* iPad optimisations */
    @media (max-width: 768px) {
      .pick-form { padding: 16px; gap: 10px; }
      .pick-input { width: 110px; font-size: 1rem; }
      .pick-item { padding: 10px 12px; gap: 12px; }
      .pick-thumb, .pick-thumb-placeholder { width: 70px; height: 70px; }
      .pick-title { font-size: 0.95rem; }
      .pick-qty { font-size: 1.3rem; min-width: 42px; height: 42px; }
    }
  </style>
</head>
<body>

  <header></header>

  <main>
    <div class="page-header">
      <h2 class="page-title">Order Picking</h2>
      <p class="page-subtitle">Enter an order number range to build a pick list — double-tap an item to mark as picked</p>
    </div>

    <!-- Order range form -->
    <form class="pick-form" id="pick-form" onsubmit="return false">
      <div class="pick-field">
        <label class="pick-label" for="pick-initials">Your Initials</label>
        <input class="pick-input" id="pick-initials" type="text" inputmode="text" placeholder="JD" maxlength="4" style="width:80px;text-transform:uppercase" />
      </div>
      <div class="pick-field">
        <label class="pick-label" for="start-order">Start Order #</label>
        <input class="pick-input" id="start-order" type="number" inputmode="numeric" placeholder="1001" min="1" />
      </div>
      <div class="pick-field">
        <label class="pick-label" for="end-order">End Order #</label>
        <div style="display:flex;gap:6px;align-items:center">
          <input class="pick-input" id="end-order" type="number" inputmode="numeric" placeholder="1010" min="1" />
          <button type="button" class="btn btn-secondary" onclick="addToEnd(50)"  style="padding:12px 14px;font-size:0.9rem;font-weight:700">+50</button>
          <button type="button" class="btn btn-secondary" onclick="addToEnd(100)" style="padding:12px 14px;font-size:0.9rem;font-weight:700">+100</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" id="btn-load" onclick="loadOrders()" style="padding:12px 28px;font-size:1rem">
        Load
      </button>
      <button type="button" class="btn btn-secondary" id="btn-cancel" onclick="cancelPick()" style="padding:12px 28px;font-size:1rem">
        Cancel
      </button>
    </form>

    <!-- Progress bar (sticky) -->
    <div class="pick-progress" id="pick-progress">
      <span class="pick-progress-text" id="progress-text">0 of 0 picked</span>
      <div class="pick-progress-bar-wrap">
        <div class="pick-progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
      <button class="pick-reset-btn" onclick="resetAll()">Reset All</button>
    </div>

    <!-- Complete message -->
    <div class="pick-complete-msg" id="complete-msg">&#10003; All items picked!</div>

    <!-- Results -->
    <div id="pick-result"></div>
  </main>

  <script src="picking.js"></script>
  <script src="nav.js"></script>
</body>
</html>
