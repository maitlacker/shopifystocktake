<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Velocity – The Self Styler WMS</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="velocity.css" />
</head>
<body>

  <header></header>

  <main>

    <!-- Controls -->
    <div class="vel-controls">
      <div class="vel-control-group">
        <label class="vel-label">Analysis period</label>
        <div class="vel-period-btns">
          <button class="vel-period-btn active" data-days="30">30 days</button>
          <button class="vel-period-btn" data-days="60">60 days</button>
          <button class="vel-period-btn" data-days="90">90 days</button>
        </div>
      </div>
      <div class="vel-control-group">
        <label class="vel-label">Low stock warning</label>
        <div class="vel-threshold-input">
          <input type="number" id="low-stock-days" value="21" min="1" max="365" />
          <span>days remaining</span>
        </div>
      </div>
      <div class="vel-control-group">
        <label class="vel-label">Critical stock</label>
        <div class="vel-threshold-input">
          <input type="number" id="critical-days" value="7" min="1" max="365" />
          <span>days remaining</span>
        </div>
      </div>
      <div class="vel-control-group">
        <span id="report-meta" class="cache-status"></span>
      </div>
      <button id="btn-run" class="btn btn-primary">&#8635; Run Report</button>
    </div>

    <!-- Summary row -->
    <div id="summary-row" class="vel-summary-row" style="display:none">
      <div class="vel-summary-card vel-red" data-filter="critical_stock">
        <div class="vel-summary-count" id="count-critical">0</div>
        <div class="vel-summary-label">Critical Stock</div>
        <div class="vel-summary-sub">Restock urgently</div>
      </div>
      <div class="vel-summary-card vel-amber" data-filter="low_stock">
        <div class="vel-summary-count" id="count-low">0</div>
        <div class="vel-summary-label">Low Stock</div>
        <div class="vel-summary-sub">Plan restock soon</div>
      </div>
      <div class="vel-summary-card vel-yellow" data-filter="imbalanced">
        <div class="vel-summary-count" id="count-imbalanced">0</div>
        <div class="vel-summary-label">Imbalanced</div>
        <div class="vel-summary-sub">Partial variant sell-out</div>
      </div>
      <div class="vel-summary-card vel-blue" data-filter="dead_stock">
        <div class="vel-summary-count" id="count-dead">0</div>
        <div class="vel-summary-label">Dead Stock</div>
        <div class="vel-summary-sub">High stock, low sales</div>
      </div>
      <div class="vel-summary-card vel-green" data-filter="ok">
        <div class="vel-summary-count" id="count-ok">0</div>
        <div class="vel-summary-label">Healthy</div>
        <div class="vel-summary-sub">No action needed</div>
      </div>
    </div>

    <!-- Filter tabs -->
    <div id="filter-tabs" class="vel-filter-tabs" style="display:none">
      <button class="vel-tab active" data-filter="all">All Styles</button>
      <button class="vel-tab" data-filter="critical_stock">🔴 Critical</button>
      <button class="vel-tab" data-filter="low_stock">🟠 Low Stock</button>
      <button class="vel-tab" data-filter="imbalanced">🟡 Imbalanced</button>
      <button class="vel-tab" data-filter="dead_stock">📦 Dead Stock</button>
      <button class="vel-tab" data-filter="ok">🟢 Healthy</button>
    </div>

    <!-- Results -->
    <div id="results">
      <div class="state-msg">
        Set your analysis period and thresholds, then click <strong>Run Report</strong>.
      </div>
    </div>

  </main>

  <script src="velocity.js"></script>
  <script src="nav.js"></script>
</body>
</html>
